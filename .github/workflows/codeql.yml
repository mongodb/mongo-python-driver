name: "CodeQL"

on:
  push:
    branches: [ "master", "v*"]
    tags: ['*']
  pull_request:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
  schedule:
    - cron: '17 10 * * 2'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: "ubuntu-latest"
    timeout-minutes: 360
    permissions:
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: c-cpp
          build-mode: manual
        - language: python
          build-mode: none
        - language: actions
          build-mode: none

    steps:
    - uses: mongodb-labs/drivers-github-tools/codeql@6916a008ec612b4575d8f630c6745e776207e30a # PYTHON-5877
      with:
        language: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        ref: ${{ inputs.ref }}
        config: |
          paths-ignore:
            - 'doc/**'
            - 'tools/**'
            - 'test/**'
