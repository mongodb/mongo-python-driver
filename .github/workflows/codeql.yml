name: "CodeQL"

on:
  push:
    branches: [ "main", "v*"]
    tags: ['*']
  pull_request:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
  schedule:
    - cron: '17 10 * * 2'

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: "ubuntu-latest"
    timeout-minutes: 360
    permissions:
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
        - language: c-cpp
          build-mode: manual
          manual-build-command: pip install -e .
        - language: python
          build-mode: none
        - language: actions
          build-mode: none
    steps:
    - uses: mongodb-labs/drivers-github-tools/codeql@95f9ce909bf0e44707fffdb92c18ed86e74aa2fd # v3
      with:
        language: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}
        manual-build-command: ${{ matrix.manual-build-command }}
        ref: ${{ inputs.ref }}
        config: |
          paths-ignore:
            - 'doc/**'
            - 'tools/**'
            - 'test/**'
